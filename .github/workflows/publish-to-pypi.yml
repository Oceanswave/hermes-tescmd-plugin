name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build and validate distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Verify release tag matches package version
        run: |
          python - <<'PY'
          import re
          import tomllib
          from pathlib import Path
          import os

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          ref_name = os.environ["GITHUB_REF_NAME"]
          tag_version = ref_name[1:] if ref_name.startswith("v") else ref_name
          if tag_version != version:
              raise SystemExit(f"Release tag {ref_name!r} does not match pyproject version {version!r}")
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:(?:a|b|rc)\d+)?(?:\.post\d+)?(?:\.dev\d+)?", version):
              raise SystemExit(f"Unexpected package version format: {version!r}")
          print(f"Release tag matches package version: {ref_name}")
          PY

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hermes-tescmd-plugin/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
